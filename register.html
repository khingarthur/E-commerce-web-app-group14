<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Sign Up - ShopEase</title>
	<link rel="stylesheet" href="css/auth.css">
</head>
<body>
	<header class="main-header">
		<div class="logo">ShopEase</div>

		<nav class="nav-links">
			<a href="index.html">Home</a>
			<a href="./php/shop.php">Shop</a>
			<a href="aboutUs.html">About</a>
			<a href="contactUs.html">Contact</a>
		</nav>

		<div class="header-actions">
			<a href="./php/go_to_cart.php" class="cart-icon">
				🛒 <span class="cart-count">View Cart</span>
			</a>
			<a href="login.html" class="btn-outline">Login</a>
			<a href="register.html" class="btn-primary">Register</a>
		</div>
	</header>

	<main class="main">
		<section class="card">
			<h1 class="title">Sign Up</h1>
			<p id="signup-success" style="display:none; color:#166534; margin-bottom:12px; text-align:center; font-weight:600;">Signup successful. Redirecting to login...</p>
			<p id="signup-error" style="display:none; color:#dc2626; margin-bottom:12px; text-align:center; font-weight:600;"></p>

			<form action="./php/auth.php" method="post">
				<input type="hidden" name="action" value="register">
				<div class="form-group">
					<label for="fullName">Full Name</label>
					<input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>
				</div>

				<div class="form-group">
					<label for="email">Email Address</label>
					<input type="email" id="email" name="email" placeholder="Enter your email" required>
				</div>

				<div class="form-group">
					<label for="password">Password</label>
					<input type="password" id="password" name="password" placeholder="Create a password" required>
				</div>

				<div class="form-group">
					<label for="confirmPassword">Confirm Password</label>
					<input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirm your password" required>
				</div>

				<button type="submit" class="btn">Sign Up</button>

				<p class="help-link switch-text">Already have an account? <a href="login.html">Login</a></p>
			</form>
		</section>
	</main>

	<footer class="main-footer">

        <p class="copyright">
            &copy; 2026 ShopEase. All rights reserved.
        </p>
    </footer>
	<script>
		const registerParams = new URLSearchParams(window.location.search);
		const signupSuccess = document.getElementById('signup-success');
		const signupError = document.getElementById('signup-error');
		const fullNameInput = document.getElementById('fullName');
		const emailInput = document.getElementById('email');

		const oldFullName = registerParams.get('fullName');
		const oldEmail = registerParams.get('email');

		if (oldFullName && fullNameInput) {
			fullNameInput.value = oldFullName;
		}

		if (oldEmail && emailInput) {
			emailInput.value = oldEmail;
		}

		if (registerParams.get('status') === 'success' && signupSuccess) {
			signupSuccess.style.display = 'block';
			// Delay briefly so users can read the success message before redirecting.
			setTimeout(function () {
				window.location.href = 'login.html';
			}, 1600);
		}

		if (signupError) {
			const error = registerParams.get('error');

			if (error === 'missing_fields') {
				signupError.textContent = 'Please fill in all required fields.';
				signupError.style.display = 'block';
			}

			if (error === 'password_mismatch') {
				signupError.textContent = 'Passwords do not match.';
				signupError.style.display = 'block';
			}

			if (error === 'email_exists') {
				signupError.textContent = 'Email already exists. Please use another email.';
				signupError.style.display = 'block';
			}
		}
	</script>
</body>
</html>
